<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ヤオヨロクリッカー</title>
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0c; --fire: #e63946; --water: #457b9d; --earth: #a0522d; --sky: #87ceeb; --evil: #9400d3; }
        * { touch-action: manipulation; user-select: none; -webkit-user-select: none; box-sizing: border-box; }
        body { background: var(--bg); color: #e0e0e0; text-align: center; font-family: serif; margin: 0; overflow: hidden; }

        /* ヘッダー */
        #header { background: rgba(20,20,25,0.95); padding: 10px; border-bottom: 1px solid var(--gold); position: fixed; top:0; width:100%; z-index:1000; display: flex; justify-content: space-around; }
        .val { color: var(--gold); font-weight: bold; }

        /* 各画面：スクロール可能に修正 */
        .screen { display: none; padding: 70px 10px 100px; height: 100vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .screen.active { display: block; }

        /* アニメーション：画面揺れ */
        @keyframes shake { 0% { transform:translate(0,0); } 25% { transform:translate(5px,5px); } 50% { transform:translate(-5px,0); } 75% { transform:translate(5px,-5px); } 100% { transform:translate(0,0); } }
        .crit-shake { animation: shake 0.2s infinite; background: rgba(255,0,0,0.15) !important; }

        /* 浮遊数字 */
        .float-num { position: absolute; color: var(--gold); font-weight: bold; pointer-events: none; animation: floatUp 0.6s ease-out forwards; z-index: 2000; }
        @keyframes floatUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-50px); } }

        /* メインボタン */
        #main-btn { width:160px; height:160px; border-radius:50%; background:radial-gradient(#444,#000); border:3px solid var(--gold); color:#fff; font-size:1.2rem; cursor:pointer; }

        /* カードリスト */
        #inventory { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .card { background: #111; border: 2px solid #444; border-radius: 8px; padding: 10px; position: relative; text-align: left; }
        .attr-fire { border-color: var(--fire); } .attr-water { border-color: var(--water); } .attr-earth { border-color: var(--earth); } .attr-sky { border-color: var(--sky); } .attr-evil { border-color: var(--evil); }
        .lvl-badge { position: absolute; top: 5px; right: 5px; background: var(--gold); color: #000; padding: 2px 5px; border-radius: 3px; font-weight: bold; font-size: 0.7rem; }

        /* オーバーレイ */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; align-items: center; justify-content: center; flex-direction: column; padding: 20px; }
        .modal { width: 100%; max-height: 80vh; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid var(--gold); overflow-y: auto; }

        /* メニュー */
        #menu-bar { position: fixed; bottom: 0; width: 100%; background: #16161a; display: flex; border-top: 1px solid #333; z-index: 1000; }
        .menu-item { flex: 1; padding: 15px; color: #777; font-size: 0.8rem; }
        .menu-item.active { color: var(--gold); background: #1f1f25; }

        button { background: #222; color: #fff; border: 1px solid #555; padding: 10px; border-radius: 5px; margin: 5px; }
    </style>
</head>
<body id="body">

<div id="header">
    <div>霊貨 <span id="coins" class="val">0</span></div>
    <div>神結晶 <span id="rare-coins" class="val">0</span></div>
</div>

<div id="screen-home" class="screen active">
    <div style="height:35vh; display:flex; align-items:center; justify-content:center; position:relative;" id="click-area">
        <button id="main-btn">観測する</button>
    </div>
    <div id="status-panel" style="text-align:left; background:#1a1a1a; padding:15px; border-radius:10px; font-size:0.85rem;">
        <p>● 観測効率: <span id="st-p" class="val">1</span></p>
        <p>● 霊貨倍率: <span id="st-m" class="val">1.0</span>x</p>
        <p>● 会心率: <span id="st-c" class="val">0</span>%</p>
        <p>● 結晶発見率: <span id="st-r" class="val">0.5</span>%</p>
    </div>
</div>

<div id="screen-gacha" class="screen">
    <h3>通常招集</h3>
    <button onclick="gacha('normal', 1)">1連 (100霊貨)</button>
    <button onclick="gacha('normal', 10)">10連</button>
    <button onclick="gacha('normal', 100)">100連</button>
    <hr style="border-color:#333; margin:20px 0;">
    <h3 style="color:var(--gold);">稀代招集</h3>
    <button onclick="gacha('rare', 1)" style="border-color:var(--gold); color:var(--gold);">1回 (5神結晶)</button>
</div>

<div id="screen-zukan" class="screen">
    <h3>顕現リスト</h3>
    <div id="inventory"></div>
</div>

<div id="screen-profile" class="screen">
    <h3>観測記録</h3>
    <div class="modal" style="text-align:left; margin:0 auto;">
        <p>● 累計獲得霊貨: <span id="stat-total-coins">0</span></p>
        <p>● 総観測数(Tap): <span id="stat-total-clicks">0</span></p>
        <p>● 総招集数: <span id="stat-total-gacha">0</span></p>
        <p>● 神結晶発見数: <span id="stat-total-rare">0</span></p>
    </div>
</div>

<div id="menu-bar">
    <div class="menu-item active" onclick="changeScreen('home', this)">ホーム</div>
    <div class="menu-item" onclick="changeScreen('gacha', this)">ガチャ</div>
    <div class="menu-item" onclick="changeScreen('zukan', this)">図鑑</div>
    <div class="menu-item" onclick="changeScreen('profile', this)">記録</div>
</div>

<div id="detail-overlay" class="overlay" onclick="this.style.display='none'">
    <div class="modal" id="detail-content" onclick="event.stopPropagation()"></div>
</div>

<div id="gacha-overlay" class="overlay" onclick="this.style.display='none'">
    <div class="modal">
        <h4>招集結果</h4>
        <div id="gacha-res-list" style="display:grid; grid-template-columns:repeat(3,1fr); gap:5px;"></div>
        <button style="width:100%; margin-top:15px;">確認</button>
    </div>
</div>

<script src="cards.js"></script>
<script>
    let state = {
        coins: 0, rareCoins: 0, inv: {}, 
        stats: { p: 1, m: 1.0, c: 0, r: 0.005 },
        totalCoins: 0, totalClicks: 0, totalGacha: 0, totalRare: 0
    };

    function save() { localStorage.setItem('yaoyoro_final', JSON.stringify(state)); }
    function load() {
        const s = localStorage.getItem('yaoyoro_final');
        if (s) state = JSON.parse(s);
        updateStats();
        updateDisplay();
    }

    function updateStats() {
        let p = 1; let m = 1.0; let c = 0; let r = 0.005;
        for (let id in state.inv) {
            const card = cardData.find(x => x.id == id);
            const l = state.inv[id].l;
            if (!card || l === 0) continue;
            if (card.attr === "fire") p += card.bonus * l;
            if (card.attr === "water") m += card.bonus * l;
            if (card.attr === "earth") c += card.bonus * l;
            if (card.attr === "sky") r += card.bonus * l;
            if (card.attr === "evil") m *= (1 + card.bonus * l);
        }
        state.stats = { p, m, c, r };
    }

    document.getElementById('main-btn').onclick = (e) => {
        state.totalClicks++;
        let isCrit = Math.random() < state.stats.c;
        let gain = state.stats.p * state.stats.m * (isCrit ? 5 : 1);
        state.coins += gain; state.totalCoins += gain;

        if (Math.random() < state.stats.r) { state.rareCoins++; state.totalRare++; }

        showTapEffect(e.clientX, e.clientY, Math.floor(gain), isCrit);
        if (isCrit) {
            document.getElementById('body').classList.add('crit-shake');
            setTimeout(() => document.getElementById('body').classList.remove('crit-shake'), 200);
        }
        updateDisplay(); save();
    };

    function showTapEffect(x, y, val, crit) {
        const el = document.createElement('div');
        el.className = 'float-num';
        el.innerText = (crit ? "会心!" : "") + "+" + val;
        el.style.left = x + 'px'; el.style.top = y + 'px';
        if (crit) el.style.color = "red";
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 600);
    }

    function gacha(type, times) {
        let cost = type === 'normal' ? 100 * times : 5 * times;
        let currency = type === 'normal' ? 'coins' : 'rareCoins';
        if (state[currency] < cost) return alert("不足しています");
        state[currency] -= cost; state.totalGacha += times;

        let results = [];
        for (let i = 0; i < times; i++) {
            let roll = Math.random() * 100;
            let rarity = 1;
            if (type === 'normal') {
                if (roll < 0.0001) rarity = 4; else if (roll < 5) rarity = 3; else if (roll < 25) rarity = 2; else rarity = 1;
            } else {
                if (roll < 3) rarity = 5; else if (roll < 20) rarity = 4; else rarity = 3;
            }
            let pool = cardData.filter(x => x.rare === rarity);
            let card = pool.length ? pool[Math.floor(Math.random()*pool.length)] : cardData[0];
            
            if (!state.inv[card.id]) state.inv[card.id] = { c: 0, l: 0 };
            state.inv[card.id].c++;
            let next = Math.pow(state.inv[card.id].l + 1, 2);
            if (state.inv[card.id].c >= next) { state.inv[card.id].l++; state.inv[card.id].c = 0; }
            results.push(card);
        }
        document.getElementById('gacha-res-list').innerHTML = results.map(c => `<div style="font-size:0.6rem; border:1px solid #444; padding:2px;">★${c.rare}<br>${c.name}</div>`).join('');
        document.getElementById('gacha-overlay').style.display = 'flex';
        updateStats(); updateDisplay(); save();
    }

    function showDetail(id) {
        const c = cardData.find(x => x.id == id);
        const info = state.inv[id];
        document.getElementById('detail-content').innerHTML = `
            <h3 style="color:var(--gold)">★${c.rare} ${c.name}</h3>
            <p style="color:#888;">属性: ${c.attr.toUpperCase()} / 強化: +${info.l}</p>
            <div style="text-align:left; font-size:0.9rem; line-height:1.6; border-top:1px solid #333; padding-top:10px;">${c.story}</div>
            <button onclick="document.getElementById('detail-overlay').style.display='none'" style="width:100%; margin-top:20px;">戻る</button>
        `;
        document.getElementById('detail-overlay').style.display = 'flex';
    }

    function updateDisplay() {
        document.getElementById('coins').innerText = Math.floor(state.coins).toLocaleString();
        document.getElementById('rare-coins').innerText = state.rareCoins;
        document.getElementById('st-p').innerText = state.stats.p;
        document.getElementById('st-m').innerText = state.stats.m.toFixed(2);
        document.getElementById('st-c').innerText = (state.stats.c * 100).toFixed(1);
        document.getElementById('st-r').innerText = (state.stats.r * 100).toFixed(3);
        
        document.getElementById('stat-total-coins').innerText = Math.floor(state.totalCoins).toLocaleString();
        document.getElementById('stat-total-clicks').innerText = state.totalClicks;
        document.getElementById('stat-total-gacha').innerText = state.totalGacha;
        document.getElementById('stat-total-rare').innerText = state.totalRare;

        const invBox = document.getElementById('inventory');
        invBox.innerHTML = "";
        for (let id in state.inv) {
            const c = cardData.find(x => x.id == id);
            const info = state.inv[id];
            const next = Math.pow(info.l + 1, 2);
            invBox.innerHTML += `
                <div class="card attr-${c.attr}" onclick="showDetail(${id})">
                    <div class="lvl-badge">+${info.l}</div>
                    <small>★${c.rare}</small><br><b>${c.name}</b>
                    <progress value="${info.c}" max="${next}" style="width:100%"></progress>
                    <div style="font-size:0.6rem; color:#888; text-align:right;">${info.c} / ${next}</div>
                </div>
            `;
        }
    }

    function changeScreen(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + id).classList.add('active');
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        el.classList.add('active');
    }
    window.onload = load;
</script>
</body>
</html>
