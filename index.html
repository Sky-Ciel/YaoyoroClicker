<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ヤオヨロクリッカー</title>
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0c; --fire: #e63946; --water: #457b9d; --earth: #a0522d; --sky: #87ceeb; --evil: #9400d3; }
        * { touch-action: manipulation; user-select: none; box-sizing: border-box; }
        body { background: var(--bg); color: #e0e0e0; text-align: center; font-family: serif; margin: 0; }

        /* ヘッダー */
        #header { background: rgba(20,20,25,0.9); padding: 10px; border-bottom: 1px solid var(--gold); position: fixed; top:0; width:100%; z-index:1000; display: flex; justify-content: space-around; }
        .val { color: var(--gold); font-weight: bold; }

        /* 画面 */
        .screen { display: none; padding: 70px 10px 80px; height: 100vh; overflow-y: auto; }
        .screen.active { display: block; }

        /* ガチャリザルト演出 */
        #gacha-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:3000; align-items:center; justify-content:center; flex-direction:column; }
        .res-card { border: 1px solid #444; margin: 5px; padding: 5px; font-size: 0.7rem; display: inline-block; width: 90px; vertical-align: top; }

        /* カードリスト */
        #inventory { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .card { background: #111; border: 2px solid #444; border-radius: 8px; padding: 10px; position: relative; text-align: left; min-height: 120px; }
        .attr-fire { border-color: var(--fire); } .attr-water { border-color: var(--water); } .attr-earth { border-color: var(--earth); } .attr-sky { border-color: var(--sky); } .attr-evil { border-color: var(--evil); }
        .lvl-badge { position: absolute; top: 5px; right: 5px; background: var(--gold); color: #000; padding: 2px 5px; border-radius: 3px; font-weight: bold; font-size: 0.7rem; }
        .bonus-txt { font-size: 0.75rem; color: #aaa; margin: 5px 0; }
        .prog-val { font-size: 0.65rem; color: #888; text-align: right; }

        /* メニューバー */
        #menu-bar { position: fixed; bottom: 0; width: 100%; background: #16161a; display: flex; border-top: 1px solid #333; z-index: 1000; }
        .menu-item { flex: 1; padding: 15px; color: #777; font-size: 0.8rem; }
        .menu-item.active { color: var(--gold); }
        
        button { background: #222; color: #fff; border: 1px solid #555; padding: 10px; border-radius: 5px; margin: 5px; cursor: pointer; }
        .btn-rare { border-color: var(--gold); color: var(--gold); }
    </style>
</head>
<body>

<div id="header">
    <div>霊貨 <span id="coins" class="val">0</span></div>
    <div>神結晶 <span id="rare-coins" class="val">0</span></div>
</div>

<div id="screen-home" class="screen active">
    <div style="height:40vh; display:flex; align-items:center; justify-content:center;">
        <button id="main-btn" style="width:150px; height:150px; border-radius:50%; background:radial-gradient(#444,#000); border:3px solid var(--gold); color:#fff; font-size:1.2rem;">観測</button>
    </div>
    <div id="status-panel" style="text-align:left; background:#1a1a1a; padding:15px; border-radius:10px; font-size:0.85rem;">
        <p>● 観測効率: <span id="st-p" class="val">1</span> (+<span id="st-p-add">0</span>)</p>
        <p>● 霊貨倍率: <span id="st-m" class="val">1.0</span>x</p>
        <p>● クリティカル率: <span id="st-c" class="val">0</span>%</p>
        <p>● 神結晶発見率: <span id="st-r" class="val">0.5</span>%</p>
    </div>
</div>

<div id="screen-gacha" class="screen">
    <div style="margin-bottom:30px;">
        <h3>通常招集</h3>
        <p style="font-size:0.8rem; color:#888;">(★1-3 / ★4: 0.0001%)</p>
        <button onclick="gacha('normal', 1)">1連 (100霊貨)</button>
        <button onclick="gacha('normal', 10)">10連</button>
    </div>
    <div style="border-top: 1px solid #333; padding-top:20px;">
        <h3 style="color:var(--gold);">稀代招集</h3>
        <p style="font-size:0.8rem; color:#888;">(★3-5確定 / 1回 5神結晶)</p>
        <button class="btn-rare" onclick="gacha('rare', 1)">招集する</button>
    </div>
</div>

<div id="screen-zukan" class="screen">
    <h3>顕現リスト</h3>
    <div id="inventory"></div>
</div>

<div id="gacha-overlay" onclick="this.style.display='none'">
    <div style="background:#1a1a1a; padding:20px; border:1px solid var(--gold); width:90%; border-radius:10px;">
        <h4>招集結果</h4>
        <div id="gacha-res-list" style="max-height:60vh; overflow-y:auto;"></div>
        <p style="font-size:0.8rem; color:#888; margin-top:10px;">(画面タップで閉じる)</p>
    </div>
</div>

<div id="menu-bar">
    <div class="menu-item active" onclick="changeScreen('home', this)">ホーム</div>
    <div class="menu-item" onclick="changeScreen('gacha', this)">ガチャ</div>
    <div class="menu-item" onclick="changeScreen('zukan', this)">図鑑</div>
</div>

<script src="cards.js"></script>
<script>
    let state = { coins: 0, rareCoins: 0, inv: {}, stats: { p: 1, pAdd: 0, m: 1.0, c: 0, r: 0.005 } };

    function save() { localStorage.setItem('yaoyoro_v4', JSON.stringify(state)); }
    function load() {
        const s = localStorage.getItem('yaoyoro_v4');
        if (s) state = JSON.parse(s);
        updateStats();
        updateDisplay();
    }

    function updateStats() {
        let p = 1; let pa = 0; let m = 1.0; let c = 0; let r = 0.005;
        for (let id in state.inv) {
            const card = cardData.find(x => x.id == id);
            const l = state.inv[id].l;
            if (!card || l === 0) continue;
            if (card.attr === "fire") pa += card.bonus * l;
            if (card.attr === "water") m += card.bonus * l;
            if (card.attr === "earth") c += card.bonus * l;
            if (card.attr === "sky") r += card.bonus * l;
            if (card.attr === "evil") m *= (1 + card.bonus * l);
        }
        state.stats = { p: p, pAdd: pa, m: m, c: c, r: r };
    }

    document.getElementById('main-btn').onclick = () => {
        let isCrit = Math.random() < state.stats.c;
        let gain = (state.stats.p + state.stats.pAdd) * state.stats.m * (isCrit ? 5 : 1);
        state.coins += gain;
        if (Math.random() < state.stats.r) state.rareCoins++;
        updateDisplay();
        save();
    };

    function gacha(type, times) {
        let cost = type === 'normal' ? 100 * times : 5 * times;
        let currency = type === 'normal' ? 'coins' : 'rareCoins';
        if (state[currency] < cost) return alert("霊貨または神結晶が足りません");
        state[currency] -= cost;

        let results = [];
        for (let i = 0; i < times; i++) {
            let roll = Math.random() * 100;
            let rarity = 1;
            if (type === 'normal') {
                if (roll < 0.0001) rarity = 4;
                else if (roll < 5) rarity = 3;
                else if (roll < 25) rarity = 2;
                else rarity = 1;
            } else {
                if (roll < 2) rarity = 5;
                else if (roll < 15) rarity = 4;
                else rarity = 3;
            }
            let pool = cardData.filter(x => x.rare === rarity);
            if (pool.length === 0) pool = [cardData[0]];
            let card = pool[Math.floor(Math.random() * pool.length)];
            
            if (!state.inv[card.id]) state.inv[card.id] = { c: 0, l: 0 };
            state.inv[card.id].c++;
            let next = Math.pow(state.inv[card.id].l + 1, 2);
            if (state.inv[card.id].c >= next) { state.inv[card.id].l++; state.inv[card.id].c = 0; }
            results.push(card);
        }
        showRes(results);
        updateStats();
        updateDisplay();
        save();
    }

    function showRes(list) {
        document.getElementById('gacha-res-list').innerHTML = list.map(c => `
            <div class="res-card attr-${c.attr}">★${c.rare}<br>${c.name}</div>
        `).join('');
        document.getElementById('gacha-overlay').style.display = 'flex';
    }

    function updateDisplay() {
        document.getElementById('coins').innerText = Math.floor(state.coins).toLocaleString();
        document.getElementById('rare-coins').innerText = state.rareCoins;
        document.getElementById('st-p-add').innerText = state.stats.pAdd;
        document.getElementById('st-m').innerText = state.stats.m.toFixed(2);
        document.getElementById('st-c').innerText = (state.stats.c * 100).toFixed(1);
        document.getElementById('st-r').innerText = (state.stats.r * 100).toFixed(3);

        const invBox = document.getElementById('inventory');
        invBox.innerHTML = "";
        for (let id in state.inv) {
            const c = cardData.find(x => x.id == id);
            const info = state.inv[id];
            const next = Math.pow(info.l + 1, 2);
            invBox.innerHTML += `
                <div class="card attr-${c.attr}">
                    <div class="lvl-badge">+${info.l}</div>
                    <b>★${c.rare} ${c.name}</b>
                    <div class="bonus-txt">${c.attr === 'fire' ? '効率' : c.attr === 'water' ? '倍率' : c.attr === 'earth' ? '会心' : c.attr === 'sky' ? '結晶率' : '全体'} +${c.bonus}</div>
                    <progress value="${info.c}" max="${next}" style="width:100%"></progress>
                    <div class="prog-val">${info.c} / ${next}</div>
                </div>
            `;
        }
    }

    function changeScreen(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + id).classList.add('active');
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        el.classList.add('active');
    }

    window.onload = load;
</script>
</body>
</html>
