<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ヤオヨロクリッカー</title>
    <style>
        :root { --main-gold: #d4af37; --bg-dark: #0f0f12; }
        * { touch-action: manipulation; user-select: none; -webkit-user-select: none; box-sizing: border-box; }
        body { background: var(--bg-dark); color: #e0e0e0; text-align: center; font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif; margin: 0; overflow: hidden; }

        /* ヘッダー */
        #header { 
            background: rgba(20, 20, 25, 0.9); padding: 10px; border-bottom: 1px solid var(--main-gold); 
            position: fixed; top: 0; width: 100%; z-index: 1000;
            display: flex; justify-content: space-around; align-items: center;
        }
        .stat-item { font-size: 0.9rem; }
        .val { color: var(--main-gold); font-weight: bold; font-size: 1.1rem; }

        /* 画面表示 */
        .screen { display: none; padding-top: 70px; height: 100vh; overflow-y: auto; padding-bottom: 80px; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ホーム：観測ボタン */
        #main-btn-container { height: 60vh; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        #main-btn { 
            width: 180px; height: 180px; border-radius: 50%; 
            background: radial-gradient(#333, #000); border: 3px solid var(--main-gold);
            color: #fff; font-size: 1.2rem; box-shadow: 0 0 20px rgba(212,175,55,0.2);
            transition: transform 0.05s; cursor: pointer;
        }
        #main-btn:active { transform: scale(0.92); }

        /* ガチャ画面：鳥居デザイン */
        .gacha-illust { 
            width: 80%; max-width: 300px; height: 200px; margin: 20px auto;
            background: linear-gradient(to top, #400, #900); border-radius: 10px;
            position: relative; display: flex; align-items: center; justify-content: center;
            border: 2px solid var(--main-gold); overflow: hidden;
        }
        .gacha-illust::before { content: "⛩️"; font-size: 5rem; opacity: 0.5; }

        /* 詳細オーバーレイ */
        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 3000; align-items: center; justify-content: center;
        }
        .modal { width: 85%; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid var(--main-gold); }

        /* メニューバー */
        #menu-bar { 
            position: fixed; bottom: 0; width: 100%; background: #16161a; 
            display: flex; border-top: 1px solid #333; z-index: 1000;
        }
        .menu-item { flex: 1; padding: 15px; color: #777; font-size: 0.8rem; }
        .menu-item.active { color: var(--main-gold); background: #1f1f25; }

        /* 共通ボタン */
        .btn { background: #2a2a32; color: #fff; border: 1px solid #444; padding: 10px 15px; border-radius: 20px; margin: 5px; }
        .btn-gold { border-color: var(--main-gold); color: var(--main-gold); }

        /* カード表示（図鑑） */
        #inventory { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; }
        .card { background: #1a1a1f; border-radius: 8px; padding: 8px; font-size: 0.7rem; border-bottom: 2px solid #333; }
        progress { width: 100%; height: 4px; border-radius: 2px; }
    </style>
</head>
<body>

<div id="header">
    <div class="stat-item">霊貨 <span id="coins" class="val">0</span></div>
    <div class="stat-item">神結晶 <span id="rare-coins" class="val">0</span></div>
</div>

<div id="screen-home" class="screen active">
    <div id="main-btn-container">
        <button id="main-btn">観測する</button>
        <p style="font-size: 0.8rem; color: #888; margin-top: 20px;">タップで霊貨を獲得</p>
    </div>
</div>

<div id="screen-gacha" class="screen">
    <h3>神々の招集</h3>
    <div class="gacha-illust" id="gacha-visual"></div>
    <div>
        <button class="btn" onclick="pullGacha(1)">1連</button>
        <button class="btn" onclick="pullGacha(10)">10連</button>
        <button class="btn btn-gold" onclick="openOverlay()">詳細・確率</button>
    </div>
    <div id="gacha-res" style="font-size: 0.75rem; color: #aaa; margin-top: 15px; height: 3em; overflow: hidden;"></div>
</div>

<div id="screen-zukan" class="screen">
    <h3>顕現リスト</h3>
    <div id="inventory"></div>
</div>

<div id="menu-bar">
    <div class="menu-item active" onclick="changeScreen('home', this)">ホーム</div>
    <div class="menu-item" onclick="changeScreen('gacha', this)">ガチャ</div>
    <div class="menu-item" onclick="changeScreen('zukan', this)">図鑑</div>
</div>

<div id="overlay" onclick="closeOverlay()">
    <div class="modal" onclick="event.stopPropagation()">
        <h4>観測詳細</h4>
        <p style="font-size: 0.8rem; text-align: left;">
            ・★5：1% (忘却/天理)<br>
            ・★4：4% (業火)<br>
            ・★1-3：95%<br><br>
            神結晶は観測時に0.5%の確率で出現します。
        </p>
        <button class="btn" onclick="closeOverlay()">閉じる</button>
    </div>
</div>

<script src="cards.js"></script>
<script>
    let state = {
        coins: 0,
        rareCoins: 0,
        power: 1,
        inv: {} // { id: { c: count, l: level } }
    };

    // セーブ＆ロード
    function save() { localStorage.setItem('yaoyoro_save', JSON.stringify(state)); }
    function load() {
        const saved = localStorage.getItem('yaoyoro_save');
        if (saved) {
            state = JSON.parse(saved);
            calculatePower();
            updateDisplay();
        }
    }

    function calculatePower() {
        let p = 1;
        for (let id in state.inv) {
            const card = cardData.find(c => c.id == id);
            if (card) p += (state.inv[id].l * card.rare * 2);
        }
        state.power = p;
    }

    function changeScreen(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + id).classList.add('active');
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        el.classList.add('active');
    }

    function openOverlay() { document.getElementById('overlay').style.display = 'flex'; }
    function closeOverlay() { document.getElementById('overlay').style.display = 'none'; }

    // メインクリック
    document.getElementById('main-btn').onclick = () => {
        state.coins += state.power;
        if (Math.random() < 0.005) state.rareCoins++;
        updateDisplay();
        save();
    };

    function pullGacha(times) {
        const cost = 100 * times;
        if (state.coins < cost) return alert("霊貨が足りません");
        state.coins -= cost;
        
        let resText = "";
        for(let i=0; i<times; i++) {
            const card = cardData[Math.floor(Math.random() * cardData.length)];
            const cardInfo = state.inv[card.id] || { c: 0, l: 0 };
            cardInfo.c++;
            
            const next = Math.pow(cardInfo.l + 1, 2);
            if (cardInfo.c >= next) {
                cardInfo.l++;
                cardInfo.c = 0;
            }
            state.inv[card.id] = cardInfo;
            resText += `[★${card.rare}] ${card.name} / `;
        }
        document.getElementById('gacha-res').innerText = resText;
        calculatePower();
        updateDisplay();
        save();
    }

    function updateDisplay() {
        document.getElementById('coins').innerText = Math.floor(state.coins).toLocaleString();
        document.getElementById('rare-coins').innerText = state.rareCoins.toLocaleString();
        
        const invBox = document.getElementById('inventory');
        invBox.innerHTML = "";
        for (let id in state.inv) {
            const card = cardData.find(c => c.id == id);
            const info = state.inv[id];
            const next = Math.pow(info.l + 1, 2);
            invBox.innerHTML += `
                <div class="card">
                    <b style="color:var(--main-gold)">+${info.l}</b><br>
                    ${card.name}<br>
                    <progress value="${info.c}" max="${next}"></progress>
                </div>
            `;
        }
    }

    window.onload = load;
</script>
</body>
</html>
