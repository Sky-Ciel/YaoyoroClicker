<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ヤオヨロクリッカー</title>
    <style>
        * { touch-action: manipulation; user-select: none; -webkit-user-select: none; box-sizing: border-box; }
        body { background: #0d0d0d; color: #e0e0e0; text-align: center; font-family: serif; margin: 0; }
        
        /* 画面切り替え用の設定 */
        .screen { display: none; padding-top: 60px; min-height: 100vh; }
        .screen.active { display: block; }

        /* ヘッダー（タイトル） */
        #header { 
            background: #1a1a1a; padding: 10px; border-bottom: 2px solid #b8860b; 
            position: fixed; top: 0; width: 100%; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
        }
        #title-text { font-weight: bold; color: #b8860b; }

        /* メインボタン（ホーム画面） */
        #main-btn { 
            width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(#444, #111);
            border: 4px solid #b8860b; color: #fff; font-size: 1.2rem; box-shadow: 0 8px 0 #000;
        }
        #main-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #000; }

        /* フッターメニューボタン */
        #menu-bar { 
            position: fixed; bottom: 0; width: 100%; background: #1a1a1a; 
            display: flex; border-top: 2px solid #333; z-index: 1000;
        }
        .menu-item { flex: 1; padding: 15px; color: #aaa; cursor: pointer; border-right: 1px solid #333; }
        .menu-item.active { color: #ffd700; background: #222; }

        /* ガチャ画面のオーバーレイ（簡易版） */
        #gacha-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; padding: 20px;
        }
        .close-btn { position: absolute; top: 10px; right: 10px; font-size: 2rem; color: #fff; }

        /* カード表示 */
        #inventory { display: flex; flex-wrap: wrap; justify-content: center; }
        .card { width: 100px; border: 1px solid #555; margin: 5px; padding: 5px; background: #111; font-size: 0.7rem; }
    </style>
</head>
<body>

<div id="header">
    <div id="title-text">ヤオヨロクリッカー</div>
    <div style="color: #ffd700;">金：<span id="coins">0</span></div>
</div>

<div id="screen-home" class="screen active">
    <button id="main-btn">観測</button>
    <p>現在のパワー: <span id="power">1</span></p>
</div>

<div id="screen-zukan" class="screen">
    <h3>顕現せし神々</h3>
    <div id="inventory"></div>
</div>

<div id="menu-bar">
    <div class="menu-item active" onclick="showScreen('home')">ホーム</div>
    <div class="menu-item" onclick="showGacha()">ガチャ</div>
    <div class="menu-item" onclick="showScreen('zukan')">図鑑</div>
</div>

<div id="gacha-overlay">
    <span class="close-btn" onclick="hideGacha()">×</span>
    <h2>神々の招集</h2>
    <div style="margin: 40px 0; font-size: 2rem;">[ ガチャイラスト ]</div>
    <button onclick="pullGacha(1)">壱連 (100)</button>
    <button onclick="pullGacha(10)">拾連 (1000)</button>
    <div id="gacha-result" style="margin-top: 20px; font-size: 0.9rem; color: #aaa;"></div>
</div>

<script src="cards.js"></script>

<script>
    let coins = 0;
    let clickPower = 1;
    let inv = {};

    // 画面切り替え
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + screenId).classList.add('active');
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        // 簡易的なアクティブ表示切り替え
        updateDisplay();
    }

    function showGacha() { document.getElementById('gacha-overlay').style.display = 'block'; }
    function hideGacha() { document.getElementById('gacha-overlay').style.display = 'none'; }

    // クリック処理
    document.getElementById('main-btn').onclick = () => {
        coins += clickPower;
        updateDisplay();
    };

    function pullGacha(times) {
        if (coins < 100 * times) return alert("金が足りぬ…");
        coins -= 100 * times;
        let res = "";
        for(let i=0; i<times; i++) {
            let card = cardData[Math.floor(Math.random() * cardData.length)];
            inv[card.id] = (inv[card.id] || 0) + 1;
            res += `[★${card.rare}] ${card.name} / `;
        }
        document.getElementById('gacha-result').innerText = res;
        updateDisplay();
    }

    function updateDisplay() {
        document.getElementById('coins').innerText = Math.floor(coins);
        document.getElementById('power').innerText = clickPower;
        const invBox = document.getElementById('inventory');
        invBox.innerHTML = "";
        for(let id in inv) {
            let card = cardData[id];
            invBox.innerHTML += `<div class="card">★${card.rare}<br>${card.name}<br>×${inv[id]}</div>`;
        }
    }
</script>
</body>
</html>
