<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ヤオヨロクリッカー</title>
    <style>
        /* 連打の邪魔をしない設定 */
        * { 
            touch-action: manipulation; /* ダブルタップズーム禁止 */
            user-select: none;         /* テキスト選択禁止 */
            -webkit-user-select: none;
        }

        body { 
            background: #0d0d0d; 
            color: #e0e0e0; 
            text-align: center; 
            font-family: "Hiragino Mincho ProN", "MS PMincho", serif; 
            margin: 0; 
            padding-bottom: 50px;
        }

        /* ヘッダー：情報を整理 */
        #header { 
            background: rgba(26, 26, 26, 0.95); 
            padding: 15px; 
            border-bottom: 2px solid #b8860b; 
            position: sticky; 
            top: 0; 
            z-index: 100;
            display: flex;
            justify-content: space-around;
        }
        .coin-text { font-size: 1.1rem; color: #ffd700; }

        /* メインボタン：押しやすく、かっこよく */
        #main-btn-container { margin: 40px 0; }
        #main-btn { 
            width: 180px; height: 180px; 
            border-radius: 50%; 
            background: radial-gradient(#555, #111); 
            border: 4px solid #b8860b; 
            font-size: 1.3rem; color: #fff; 
            box-shadow: 0 8px 0 #000; 
            transition: 0.05s;
            cursor: pointer;
        }
        #main-btn:active { 
            transform: translateY(4px); 
            box-shadow: 0 4px 0 #000; 
        }

        /* ガチャ・ログエリア */
        .section-title { 
            background: #222; 
            padding: 5px; 
            margin: 20px 0 10px; 
            border-left: 5px solid #b8860b;
            text-align: left;
            padding-left: 15px;
        }
        button { 
            background: #333; color: #eee; 
            border: 1px solid #555; padding: 12px 15px; 
            border-radius: 5px; font-size: 0.9rem;
        }

        #gacha-log { 
            height: 100px; overflow-y: auto; 
            background: #000; margin: 10px; 
            padding: 8px; font-size: 0.8rem; 
            border: 1px solid #333; text-align: left; 
            color: #aaa;
        }
        
        /* カードリスト：カードっぽさを強化 */
        #inventory { display: flex; flex-wrap: wrap; justify-content: center; }
        .card { 
            width: 130px; border: 2px solid; margin: 5px; 
            padding: 8px; border-radius: 8px; 
            background: #111; font-size: 0.75rem;
            position: relative;
        }
        .attr-fire { border-color: #e63946; box-shadow: 0 0 5px rgba(230,57,70,0.3); }
        .attr-water { border-color: #457b9d; }
        .attr-earth { border-color: #6d597a; }
        .attr-sky { border-color: #a8dadc; }
        .attr-evil { border-color: #590d22; }
        
        .rare-5 { color: #ff00ff; text-shadow: 0 0 5px #ff00ff; }
        .level-badge { position: absolute; top: -5px; right: -5px; background: #b8860b; color: white; border-radius: 50%; width: 24px; height: 24px; line-height: 24px; font-weight: bold; font-size: 0.7rem; }
        progress { width: 100%; height: 8px; accent-color: #b8860b; }
    </style>
</head>
<body>

<div id="header">
    <div class="coin-text">通常：<span id="coins">0</span></div>
    <div class="coin-text">稀代：<span id="rare-coins">0</span></div>
</div>

<div id="main-btn-container">
    <button id="main-btn">八百万を<br>観測する</button>
</div>

<div class="section-title">神々の顕現（ガチャ）</div>
<div style="display: flex; justify-content: center; gap: 10px;">
    <button onclick="gacha(1)">壱連 (100)</button>
    <button onclick="gacha(100)">百連 (1万)</button>
</div>

<div id="gacha-log">--- 観測の記録 ---</div>

<div class="section-title">顕現せし八百万の神々</div>
<div id="inventory"></div>

<script>
    // --- データ管理 ---
    let coins = 0;
    let rareCoins = 0;
    let clickPower = 1;
    let invData = {};

    const cardData = [
        { id: 0, name: "灯火の精霊 ポポ", rare: 1, attr: "fire", text: "小さな熾火の化身。" },
        { id: 1, name: "水滴の精霊 チル", rare: 1, attr: "water", text: "一滴の朝露から生まれた。" },
        { id: 2, name: "微風の精霊 フウ", rare: 2, attr: "sky", text: "草原を駆ける幼い風。" },
        { id: 3, name: "業火の神 カグツチ", rare: 4, attr: "fire", text: "全てを焼き尽くす荒ぶる神。" },
        { id: 4, name: "忘却の神 レテ", rare: 5, attr: "evil", text: "記憶の深淵に座する者。" },
        { id: 5, name: "天理の神 アマツ", rare: 5, attr: "sky", text: "理の頂を統べる者。" }
    ];

    // --- ロジック ---
    document.getElementById('main-btn').onclick = () => {
        coins += clickPower;
        if (Math.random() < 0.005) rareCoins++;
        updateDisplay();
    };

    function gacha(times) {
        const cost = 100 * times;
        if (coins < cost) return; 
        coins -= cost;

        let logHTML = "";
        for (let i = 0; i < times; i++) {
            const card = cardData[Math.floor(Math.random() * cardData.length)];
            const isLevelUp = addCard(card);
            logHTML = `<div>[★${card.rare}] ${card.name} ${isLevelUp ? '!!昇格!!' : ''}</div>` + logHTML;
        }
        document.getElementById('gacha-log').innerHTML = logHTML;
        updateDisplay();
    }

    function addCard(card) {
        let isLevelUp = false;
        if (!invData[card.id]) {
            invData[card.id] = { count: 1, level: 0 };
        } else {
            invData[card.id].count++;
            let needed = Math.pow(invData[card.id].level + 1, 2);
            if (invData[card.id].count >= needed) {
                invData[card.id].level++;
                invData[card.id].count = 0;
                clickPower += (card.rare * 2); 
                isLevelUp = true;
            }
        }
        return isLevelUp;
    }

    function updateDisplay() {
        document.getElementById('coins').innerText = Math.floor(coins);
        document.getElementById('rare-coins').innerText = rareCoins;
        const invBox = document.getElementById('inventory');
        invBox.innerHTML = "";
        for (let id in invData) {
            const card = cardData[id];
            const info = invData[id];
            const next = Math.pow(info.level + 1, 2);
            invBox.innerHTML += `
                <div class="card attr-${card.attr}">
                    <div class="level-badge">+${info.level}</div>
                    <span class="rare-${card.rare}">★${card.rare}</span><br>
                    <b>${card.name}</b><br>
                    <progress value="${info.count}" max="${next}"></progress><br>
                    <small>${card.text}</small>
                </div>
            `;
        }
    }
</script>
</body>
</html>
