<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ヤオヨロクリッカー</title>
    <style>
        :root { --main-gold: #d4af37; --bg-dark: #0a0a0c; --fire: #e63946; --water: #457b9d; --sky: #a8dadc; --evil: #590d22; }
        * { touch-action: manipulation; user-select: none; -webkit-user-select: none; box-sizing: border-box; }
        body { background: var(--bg-dark); color: #e0e0e0; text-align: center; font-family: serif; margin: 0; overflow: hidden; }

        /* 画面揺れアニメーション */
        @keyframes shake { 0% { transform: translate(0,0); } 25% { transform: translate(5px,5px); } 50% { transform: translate(-5px,0); } 75% { transform: translate(5px,-5px); } 100% { transform: translate(0,0); } }
        .critical-shake { animation: shake 0.2s infinite; background-color: rgba(255,0,0,0.2) !important; }

        /* ヘッダー */
        #header { background: rgba(20, 20, 25, 0.9); padding: 10px; border-bottom: 1px solid var(--main-gold); position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; justify-content: space-around; }
        .val { color: var(--main-gold); font-weight: bold; }

        /* 各画面 */
        .screen { display: none; padding-top: 70px; height: 100vh; overflow-y: auto; padding-bottom: 80px; }
        .screen.active { display: block; }

        /* 観測エリア */
        #main-btn-container { height: 50vh; display: flex; align-items: center; justify-content: center; position: relative; }
        #main-btn { width: 160px; height: 160px; border-radius: 50%; background: radial-gradient(#444, #000); border: 3px solid var(--main-gold); color: #fff; font-size: 1.2rem; cursor: pointer; z-index: 10; }
        
        /* 浮遊数字アニメ */
        .float-num { position: absolute; color: var(--main-gold); font-weight: bold; pointer-events: none; animation: floatUp 0.6s ease-out forwards; z-index: 20; }
        @keyframes floatUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-50px); } }

        /* カードデザイン（図鑑） */
        #inventory { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        .card { background: #111; border: 2px solid #444; border-radius: 8px; padding: 10px; position: relative; overflow: hidden; }
        .attr-fire { border-color: var(--fire); } .attr-water { border-color: var(--water); } .attr-sky { border-color: var(--sky); } .attr-evil { border-color: var(--evil); }
        .rare-5 { box-shadow: 0 0 10px var(--main-gold); border-style: double; }
        .lvl { position: absolute; top: 0; right: 0; background: var(--main-gold); color: #000; font-size: 0.7rem; padding: 2px 5px; font-weight: bold; }

        /* オーバーレイ */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; align-items: center; justify-content: center; }
        .modal { width: 85%; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid var(--main-gold); }

        /* ガチャ演出 */
        #gacha-flash { position: fixed; top:0; left:0; width:100%; height:100%; background:white; opacity:0; z-index:4000; pointer-events:none; }
        @keyframes flashAnim { 0% { opacity: 1; } 100% { opacity: 0; } }

        /* メニュー */
        #menu-bar { position: fixed; bottom: 0; width: 100%; background: #16161a; display: flex; border-top: 1px solid #333; z-index: 1000; }
        .menu-item { flex: 1; padding: 15px; color: #777; font-size: 0.8rem; }
        .menu-item.active { color: var(--main-gold); }
    </style>
</head>
<body id="game-body">

<div id="gacha-flash"></div>

<div id="header">
    <div>霊貨 <span id="coins" class="val">0</span></div>
    <div>神結晶 <span id="rare-coins" class="val">0</span></div>
</div>

<div id="screen-home" class="screen active">
    <div id="main-btn-container">
        <button id="main-btn">観測</button>
    </div>
    <div id="status-mini">
        現在の観測効率: <span id="power" class="val">1</span> / Tap
    </div>
</div>

<div id="screen-gacha" class="screen">
    <h3>神々の招集</h3>
    <div style="font-size: 4rem; margin: 20px;">⛩️</div>
    <button onclick="pullGacha(1)">壱連</button>
    <button onclick="pullGacha(100)">百連</button>
    <button onclick="openHelp()">出現確率</button>
    <div id="gacha-res" style="margin-top:20px; font-size:0.8rem; height:4rem; overflow:hidden; color:#888;"></div>
</div>

<div id="screen-zukan" class="screen">
    <h3>顕現リスト</h3>
    <div id="inventory"></div>
</div>

<div id="screen-profile" class="screen">
    <h3>観測者プロフィール</h3>
    <div class="modal" style="margin: 0 auto; text-align: left; width: 90%;">
        <p>累計獲得霊貨: <span id="stat-total-coins">0</span></p>
        <p>総観測回数: <span id="stat-total-clicks">0</span></p>
        <p>総招集回数: <span id="stat-total-gacha">0</span></p>
        <p>神結晶発見数: <span id="stat-total-rare">0</span></p>
    </div>
</div>

<div id="menu-bar">
    <div class="menu-item active" onclick="changeScreen('home', this)">ホーム</div>
    <div class="menu-item" onclick="changeScreen('gacha', this)">ガチャ</div>
    <div class="menu-item" onclick="changeScreen('zukan', this)">図鑑</div>
    <div class="menu-item" onclick="changeScreen('profile', this)">記録</div>
</div>

<div id="detail-overlay" class="overlay" onclick="this.style.display='none'">
    <div class="modal" id="detail-content"></div>
</div>

<div id="help-overlay" class="overlay" onclick="this.style.display='none'">
    <div class="modal">
        <h4>招集確率</h4>
        <p>★5: 1% / ★4: 5% / ★1-3: 94%</p>
        <button>閉じる</button>
    </div>
</div>

<script src="cards.js"></script>
<script>
    let state = {
        coins: 0, rareCoins: 0, power: 1, inv: {},
        totalCoins: 0, totalClicks: 0, totalGacha: 0, totalRare: 0
    };

    function save() { localStorage.setItem('yaoyoro_v2', JSON.stringify(state)); }
    function load() {
        const saved = localStorage.getItem('yaoyoro_v2');
        if (saved) state = JSON.parse(saved);
        calculatePower();
        updateDisplay();
    }

    function calculatePower() {
        let p = 1;
        for (let id in state.inv) {
            const card = cardData.find(c => c.id == id);
            if (card) p += (state.inv[id].l * card.rare * 5);
        }
        state.power = p;
    }

    // メインクリック
    document.getElementById('main-btn').onclick = (e) => {
        state.totalClicks++;
        let isCrit = Math.random() < 0.05;
        let gain = isCrit ? state.power * 5 : state.power;
        
        state.coins += gain;
        state.totalCoins += gain;

        if (Math.random() < 0.005) { state.rareCoins++; state.totalRare++; }

        // 演出
        showTapEffect(e.clientX, e.clientY, gain, isCrit);
        if (isCrit) triggerShake();
        
        updateDisplay();
        save();
    };

    function showTapEffect(x, y, val, crit) {
        const el = document.createElement('div');
        el.className = 'float-num';
        el.innerText = (crit ? "CRITICAL! " : "") + "+" + val;
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        if (crit) el.style.color = "red";
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 600);
    }

    function triggerShake() {
        document.getElementById('game-body').classList.add('critical-shake');
        setTimeout(() => document.getElementById('game-body').classList.remove('critical-shake'), 300);
    }

    function pullGacha(times) {
        if (state.coins < 100 * times) return alert("霊貨不足");
        state.coins -= 100 * times;
        state.totalGacha += times;

        document.getElementById('gacha-flash').style.animation = 'flashAnim 0.5s forwards';
        setTimeout(() => document.getElementById('gacha-flash').style.animation = '', 500);

        let res = "";
        for(let i=0; i<times; i++) {
            const card = cardData[Math.floor(Math.random() * cardData.length)];
            if(!state.inv[card.id]) state.inv[card.id] = { c: 0, l: 0 };
            state.inv[card.id].c++;
            if(state.inv[card.id].c >= Math.pow(state.inv[card.id].l + 1, 2)) {
                state.inv[card.id].l++; state.inv[card.id].count = 0;
            }
            res += `★${card.rare}${card.name} / `;
        }
        document.getElementById('gacha-res').innerText = res;
        calculatePower();
        updateDisplay();
        save();
    }

    function showDetail(id) {
        const card = cardData.find(c => c.id == id);
        const info = state.inv[id];
        document.getElementById('detail-content').innerHTML = `
            <h2 style="color:var(--main-gold)">★${card.rare} ${card.name}</h2>
            <p style="color:#aaa">属性: ${card.attr.toUpperCase()}</p>
            <p>${card.text}</p>
            <p>現在の強化値: +${info.l}</p>
            <button onclick="document.getElementById('detail-overlay').style.display='none'">閉じる</button>
        `;
        document.getElementById('detail-overlay').style.display = 'flex';
    }

    function updateDisplay() {
        document.getElementById('coins').innerText = Math.floor(state.coins).toLocaleString();
        document.getElementById('rare-coins').innerText = state.rareCoins;
        document.getElementById('power').innerText = state.power;
        
        // 統計反映
        document.getElementById('stat-total-coins').innerText = Math.floor(state.totalCoins).toLocaleString();
        document.getElementById('stat-total-clicks').innerText = state.totalClicks;
        document.getElementById('stat-total-gacha').innerText = state.totalGacha;
        document.getElementById('stat-total-rare').innerText = state.totalRare;

        const invBox = document.getElementById('inventory');
        invBox.innerHTML = "";
        for (let id in state.inv) {
            const card = cardData.find(c => c.id == id);
            const info = state.inv[id];
            invBox.innerHTML += `
                <div class="card attr-${card.attr} ${card.rare>=5?'rare-5':''}" onclick="showDetail(${id})">
                    <div class="lvl">+${info.l}</div>
                    <small>★${card.rare}</small><br>
                    <b>${card.name}</b>
                    <progress value="${info.c}" max="${Math.pow(info.l+1, 2)}"></progress>
                </div>
            `;
        }
    }

    function changeScreen(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + id).classList.add('active');
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        el.classList.add('active');
    }
    function openHelp() { document.getElementById('help-overlay').style.display='flex'; }
    window.onload = load;
</script>
</body>
</html>
