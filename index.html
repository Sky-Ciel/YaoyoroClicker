<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ヤオヨロクリッカー</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; --urushi: #1a0a0a; --syu: #a62e2e; --paper: #f0e6d2;
            --fire: #e63946; --water: #457b9d; --earth: #8b4513; --sky: #87ceeb; --evil: #4b0082;
        }
        * { touch-action: manipulation; user-select: none; -webkit-user-select: none; box-sizing: border-box; }
        body { 
            background: var(--urushi); color: #f0e6d2; text-align: center; 
            font-family: 'Noto Serif JP', serif; margin: 0; overflow: hidden;
            background-image: radial-gradient(circle at 20% 30%, rgba(212,175,55,0.05) 0%, transparent 20%),
                              radial-gradient(circle at 80% 70%, rgba(212,175,55,0.05) 0%, transparent 20%);
        }

        /* ヘッダー：漆と金の装飾 */
        #header { 
            background: linear-gradient(to bottom, #2a0a0a, #1a0a0a); padding: 12px; 
            border-bottom: 3px double var(--gold); position: fixed; top:0; width:100%; z-index:1000;
            display: flex; justify-content: space-around; box-shadow: 0 4px 10px rgba(0,0,0,0.8);
        }
        .val { color: var(--gold); font-weight: bold; text-shadow: 1px 1px 2px #000; }

        .screen { display: none; padding: 80px 15px 100px; height: 100vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .screen.active { display: block; animation: pageIn 0.5s ease-out; }
        @keyframes pageIn { from { opacity: 0; filter: sepia(1); } to { opacity: 1; filter: sepia(0); } }

        /* 観測ボタン：勾玉をイメージ */
        #main-btn { 
            width:160px; height:160px; border-radius:50%; 
            background: radial-gradient(circle at 30% 30%, #444, #000); 
            border: 4px solid var(--gold); color: var(--gold); font-size: 1.4rem;
            box-shadow: 0 0 20px rgba(212,175,55,0.3), inset 0 0 15px rgba(212,175,55,0.2);
            text-shadow: 0 0 5px var(--gold); cursor: pointer; transition: 0.1s;
        }
        #main-btn:active { transform: scale(0.92); filter: brightness(1.5); }

        /* ガチャ画面：鳥居演出 */
        .gacha-selector { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; }
        .gacha-view { 
            background: linear-gradient(135deg, #2a0a0a 0%, #3a1a1a 100%); 
            border: 2px solid var(--gold); border-radius: 15px; padding: 30px;
            width: 100%; max-width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        .torii-gate { font-size: 6rem; filter: drop-shadow(0 0 15px var(--syu)); margin-bottom: 20px; }

        /* 究極召集演出 */
        #summon-scene {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: #000; z-index: 5000; overflow: hidden;
        }
        .particle { position: absolute; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); opacity: 0; } }

        /* カードの3D召喚 */
        .summon-card {
            width: 200px; height: 300px; background: var(--card); border: 4px solid var(--gold);
            position: absolute; top: 50%; left: 50%; margin: -150px 0 0 -100px;
            animation: cardAppear 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            backface-visibility: hidden; transform-style: preserve-3d;
        }
        @keyframes cardAppear {
            0% { transform: scale(0) rotateY(0deg) translateZ(-500px); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: scale(1) rotateY(720deg) translateZ(0); opacity: 1; }
        }

        /* 魔導書 3x3 */
        .book-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 15px; }
        .file-slot { 
            aspect-ratio: 1/1.4; background: #1a1a1f; border: 1px solid #444; border-radius: 5px;
            position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }
        .file-slot.owned { background: linear-gradient(135deg, #222, #111); border: 1px solid var(--gold); }
        .file-slot.owned::after { content: ""; position: absolute; inset: 0; border: 1px solid rgba(212,175,55,0.3); pointer-events: none; }
        .file-slot.empty { opacity: 0.1; background: repeating-linear-gradient(45deg, #333, #333 5px, #222 5px, #222 10px); }

        /* メニュー */
        #menu-bar { position: fixed; bottom: 0; width: 100%; background: #1a0a0a; display: flex; border-top: 2px solid var(--gold); z-index: 1000; }
        .menu-item { flex: 1; padding: 20px; color: #777; font-size: 0.9rem; }
        .menu-item.active { color: var(--gold); font-weight: bold; background: #2a1a1a; box-shadow: inset 0 5px 10px rgba(0,0,0,0.5); }

        button { background: var(--syu); color: #fff; border: 1px solid var(--gold); padding: 12px; border-radius: 5px; font-family: inherit; cursor: pointer; }
        .btn-gold { background: var(--gold); color: #000; font-weight: bold; border: 1px solid #fff; }
        
        .float-num { position: absolute; font-weight: bold; pointer-events: none; animation: floatUp 0.6s forwards; z-index: 2000; text-shadow: 0 0 5px #000; color: var(--gold); }
        @keyframes floatUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-60px); } }
    </style>
</head>
<body id="body">

<div id="summon-scene">
    <div id="particles-container"></div>
    <div id="summon-card-target"></div>
</div>

<div id="header">
    <div>霊貨 <span id="coins" class="val">0</span></div>
    <div>神結晶 <span id="rare-coins" class="val">0</span></div>
</div>

<div id="screen-home" class="screen active">
    <div style="height:45vh; display:flex; align-items:center; justify-content:center; position:relative;">
        <button id="main-btn">観測開始</button>
    </div>
    <div style="background: rgba(0,0,0,0.6); padding:20px; border-radius:10px; border:1px solid var(--gold); margin-top:10px; text-align:left;">
        <div style="font-size:0.9rem; display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div>効率: <span id="st-p" class="val">1</span></div>
            <div>倍率: <span id="st-m" class="val">1.0</span>x</div>
            <div>会心: <span id="st-c" class="val">0</span>%</div>
            <div>結晶: <span id="st-r" class="val">0.5</span>%</div>
        </div>
    </div>
</div>

<div id="screen-gacha" class="screen">
    <h2 style="color:var(--gold); text-shadow: 0 0 10px var(--syu);">八百万の招集</h2>
    <div class="gacha-selector">
        <button onclick="changeGachaType(-1)">◀</button>
        <div id="gacha-content" class="gacha-view">
            <div class="torii-gate" id="gacha-icon">⛩️</div>
            <h3 id="gacha-title">通常招集</h3>
            <p id="gacha-desc" style="font-size:0.8rem; color:#aaa;">霊貨 100 を捧げ、精霊を呼ぶ</p>
            <div style="display:flex; justify-content:center; gap:10px;">
                <button onclick="startSummon(1)">壱連</button>
                <button onclick="startSummon(10)">拾連</button>
            </div>
        </div>
        <button onclick="changeGachaType(1)">▶</button>
    </div>
</div>

<div id="screen-zukan" class="screen">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <button onclick="toggleZukanMode()" id="zukan-toggle-btn" style="font-size:0.7rem;">全表示</button>
        <div id="page-info" style="color:var(--gold); font-weight:bold;">其の壱</div>
        <div style="display:flex; gap:10px;">
            <button onclick="changePage(-1)">前</button>
            <button onclick="changePage(1)">次</button>
        </div>
    </div>
    <div id="book-container" class="book-grid"></div>
</div>

<div id="screen-profile" class="screen">
    <h3>観測者の歩み</h3>
    <div style="background:rgba(255,255,255,0.05); padding:20px; border-radius:15px; border:1px solid var(--gold); text-align:left;">
        <p>累計霊貨: <span id="stat-total-coins" class="val">0</span></p>
        <p>総観測数: <span id="stat-total-clicks" class="val">0</span></p>
        <p>総招集数: <span id="stat-total-gacha" class="val">0</span></p>
        <p>結晶発見: <span id="stat-total-rare" class="val">0</span></p>
    </div>
</div>

<div id="menu-bar">
    <div class="menu-item active" onclick="changeScreen('home', this)">ホーム</div>
    <div class="menu-item" onclick="changeScreen('gacha', this)">ガチャ</div>
    <div class="menu-item" onclick="changeScreen('zukan', this)">図鑑</div>
    <div class="menu-item" onclick="changeScreen('profile', this)">記録</div>
</div>

<div id="detail-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:6000; align-items:center; justify-content:center; padding:20px;" onclick="this.style.display='none'">
    <div style="background:var(--urushi); padding:25px; border-radius:15px; border:2px solid var(--gold); width:100%; max-height:80vh; overflow-y:auto;" id="detail-content" onclick="event.stopPropagation()"></div>
</div>

<script src="cards.js"></script>
<script>
    let state = { coins: 0, rareCoins: 0, inv: {}, stats: { p: 1, m: 1.0, c: 0, r: 0.005 }, totalCoins: 0, totalClicks: 0, totalGacha: 0, totalRare: 0 };
    let curGachaIndex = 0, curPage = 0, showAll = true;
    const gachaTypes = [
        { title: "通常招集", desc: "霊貨 100 を捧げ、精霊を呼ぶ", icon: "⛩️", cost: 100, currency: "coins" },
        { title: "稀代招集", desc: "神結晶 5 を捧げ、高位の神を呼ぶ", icon: "✨", cost: 5, currency: "rareCoins" }
    ];

    function save() { localStorage.setItem('yaoyoro_final_v1', JSON.stringify(state)); }
    function load() {
        const s = localStorage.getItem('yaoyoro_final_v1');
        if (s) state = JSON.parse(s);
        updateStats(); updateDisplay();
    }

    function updateStats() {
        let p = 1, m = 1.0, c = 0, r = 0.005;
        for (let id in state.inv) {
            const card = cardData.find(x => x.id == id);
            const l = state.inv[id].l;
            if (!card || l === 0) continue;
            if (card.attr === "fire") p += card.bonus * l;
            if (card.attr === "water") m += card.bonus * l;
            if (card.attr === "earth") c += card.bonus * l;
            if (card.attr === "sky") r += card.bonus * l;
            if (card.attr === "evil") m *= (1 + card.bonus * l);
        }
        state.stats = { p, m, c, r };
    }

    document.getElementById('main-btn').onclick = (e) => {
        state.totalClicks++;
        let isCrit = Math.random() < state.stats.c;
        let gain = state.stats.p * state.stats.m * (isCrit ? 5 : 1);
        state.coins += gain; state.totalCoins += gain;
        if (Math.random() < state.stats.r) { state.rareCoins++; state.totalRare++; }
        showTapEffect(e.clientX, e.clientY, Math.floor(gain), isCrit);
        updateDisplay(); save();
    };

    function showTapEffect(x, y, val, crit) {
        const el = document.createElement('div');
        el.className = 'float-num';
        el.innerText = (crit ? "極・会心!" : "") + "+" + val;
        el.style.left = x + 'px'; el.style.top = y + 'px';
        if (crit) el.style.color = "#ff4500";
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 600);
    }

    function changeGachaType(dir) {
        curGachaIndex = (curGachaIndex + dir + gachaTypes.length) % gachaTypes.length;
        const g = gachaTypes[curGachaIndex];
        document.getElementById('gacha-title').innerText = g.title;
        document.getElementById('gacha-desc').innerText = g.desc;
        document.getElementById('gacha-icon').innerText = g.icon;
        document.getElementById('gacha-content').style.borderColor = curGachaIndex === 1 ? 'var(--syu)' : 'var(--gold)';
    }

    function startSummon(times) {
        const g = gachaTypes[curGachaIndex];
        const cost = g.cost * times;
        if (state[g.currency] < cost) return alert("お供え物が足りませぬ…");
        state[g.currency] -= cost; state.totalGacha += times;

        const scene = document.getElementById('summon-scene');
        scene.style.display = 'block';
        createParticles();

        setTimeout(() => {
            scene.style.display = 'none';
            executeGacha(curGachaIndex === 0 ? 'normal' : 'rare', times);
        }, 1500);
    }

    function createParticles() {
        const container = document.getElementById('particles-container');
        container.innerHTML = '';
        for(let i=0; i<30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.innerText = "🌸";
            p.style.left = Math.random() * 100 + 'vw';
            p.style.fontSize = (Math.random() * 20 + 10) + 'px';
            p.style.animationDuration = (Math.random() * 1 + 0.5) + 's';
            container.appendChild(p);
        }
    }

    function executeGacha(type, times) {
        let results = [];
        for (let i = 0; i < times; i++) {
            let roll = Math.random() * 100, rarity = 1;
            if (type === 'normal') {
                if (roll < 0.0001) rarity = 4; else if (roll < 5) rarity = 3; else if (roll < 25) rarity = 2; else rarity = 1;
            } else {
                if (roll < 3) rarity = 5; else if (roll < 20) rarity = 4; else rarity = 3;
            }
            let pool = cardData.filter(x => x.rare === rarity);
            let card = pool.length ? pool[Math.floor(Math.random()*pool.length)] : cardData[0];
            if (!state.inv[card.id]) state.inv[card.id] = { c: 0, l: 0 };
            state.inv[card.id].c++;
            if (state.inv[card.id].c >= Math.pow(state.inv[card.id].l + 1, 2)) { state.inv[card.id].l++; state.inv[card.id].c = 0; }
            results.push(card);
        }
        showResults(results);
        updateStats(); updateDisplay(); save();
    }

    function showResults(list) {
        const detail = document.getElementById('detail-content');
        detail.innerHTML = `<h3 style="color:var(--gold); border-bottom:1px solid var(--syu);">招集結果</h3><div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px;">` + 
            list.map(c => `<div style="border:1px solid var(--${c.attr}); padding:5px; font-size:0.6rem; background:#000;">★${c.rare}<br>${c.name}</div>`).join('') + 
            `</div><button onclick="document.getElementById('detail-overlay').style.display='none'" style="width:100%; margin-top:20px;">戻る</button>`;
        document.getElementById('detail-overlay').style.display = 'flex';
    }

    function changePage(dir) {
        const max = Math.ceil(cardData.length / 9) - 1;
        curPage = Math.max(0, Math.min(max, curPage + dir));
        updateDisplay();
    }

    function showDetail(id) {
        const c = cardData.find(x => x.id == id);
        const info = state.inv[id] || { l: 0, c: 0 };
        const b = (c.bonus * (info.l || 1));
        const bT = (c.attr === "earth" || c.attr === "sky") ? (b * 100).toFixed(2) + "%" : b.toFixed(2);
        document.getElementById('detail-content').innerHTML = `
            <h3 style="color:var(--${c.attr}); border-bottom:1px solid #444;">★${c.rare} ${c.name}</h3>
            <div style="background:#222; padding:15px; border-radius:10px; border:1px solid var(--gold); margin:15px 0; text-align:left;">
                <b style="color:var(--gold)">神徳：</b> ${getEffectName(c.attr)} +${bT}
            </div>
            <p style="font-style:italic; line-height:1.7; color:#ccc; text-align:left;">「${c.story}」</p>
            <button onclick="document.getElementById('detail-overlay').style.display='none'" style="width:100%; font-weight:bold; margin-top:20px;">観測へ戻る</button>
        `;
        document.getElementById('detail-overlay').style.display = 'flex';
    }

    function getEffectName(attr) {
        return { fire: "基礎効率", water: "霊貨倍率", earth: "会心発生率", sky: "結晶発見率", evil: "深淵最終倍率" }[attr];
    }

    function updateDisplay() {
        document.getElementById('coins').innerText = Math.floor(state.coins).toLocaleString();
        document.getElementById('rare-coins').innerText = state.rareCoins;
        document.getElementById('st-p').innerText = state.stats.p;
        document.getElementById('st-m').innerText = state.stats.m.toFixed(2);
        document.getElementById('st-c').innerText = (state.stats.c * 100).toFixed(1);
        document.getElementById('st-r').innerText = (state.stats.r * 100).toFixed(3);
        
        document.getElementById('stat-total-coins').innerText = Math.floor(state.totalCoins).toLocaleString();
        document.getElementById('stat-total-clicks').innerText = state.totalClicks;
        document.getElementById('stat-total-gacha').innerText = state.totalGacha;
        document.getElementById('stat-total-rare').innerText = state.totalRare;

        const book = document.getElementById('book-container');
        book.innerHTML = "";
        const start = curPage * 9;
        for(let i=0; i<9; i++){
            const c = cardData[start + i];
            if(!c) { book.innerHTML += `<div class="file-slot empty"></div>`; continue; }
            const owned = !!state.inv[c.id];
            const info = state.inv[c.id] || { l: 0, c: 0 };
            book.innerHTML += `
                <div class="file-slot ${owned ? 'owned' : 'empty'}" onclick="${owned ? `showDetail(${c.id})` : ''}" style="${owned ? `border-color:var(--${c.attr})` : ''}">
                    ${owned ? `<div class="file-lvl">+${info.l}</div>` : ''}
                    <div style="font-size:1.5rem;">${owned ? '📜' : '？'}</div>
                    <div style="font-size:0.55rem; width:90%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${owned ? c.name : '未確認'}</div>
                    ${owned ? `<progress value="${info.c}" max="${Math.pow(info.l+1, 2)}" style="width:80%; height:3px;"></progress>` : ''}
                </div>
            `;
        }
        document.getElementById('page-info').innerText = `其の${['','壱','弐','参','肆','伍'][curPage+1] || curPage+1}`;
    }

    function changeScreen(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + id).classList.add('active');
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        el.classList.add('active');
    }
    window.onload = load;
</script>
</body>
</html>
