<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ヤオヨロクリッカー</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #c5a059; --bg: #101014; --card: #1c1c22;
            --fire: #e63946; --water: #457b9d; --earth: #a0522d; --sky: #87ceeb; --evil: #9400d3;
        }
        * { touch-action: manipulation; user-select: none; -webkit-user-select: none; box-sizing: border-box; }
        body { 
            background: var(--bg); color: #f0f0f0; text-align: center; 
            font-family: 'Noto Serif JP', serif; margin: 0; overflow: hidden;
        }

        /* 共通背景（和紙テクスチャ風） */
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }

        #header { 
            background: rgba(20, 20, 25, 0.95); padding: 12px; border-bottom: 2px solid var(--gold); 
            position: fixed; top:0; width:100%; z-index:1000; display: flex; justify-content: space-around;
        }

        .screen { display: none; padding: 80px 15px 100px; height: 100vh; overflow-y: auto; opacity: 0; }
        .screen.active { display: block; animation: fadeIn 0.4s forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ガチャスライダー：完治版 */
        #gacha-viewport { width: 100%; overflow: hidden; position: relative; padding: 20px 0; }
        #gacha-wrapper { display: flex; transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .gacha-item { min-width: 100%; padding: 0 15px; }
        .gacha-box { 
            background: var(--card); border: 1px solid var(--gold); border-radius: 20px; padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .gacha-illust { height: 150px; background: radial-gradient(#333, #000); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 5rem; margin-bottom: 20px; border: 1px solid #444; }

        /* 魔導書（図鑑）：3x3 ファイリング */
        .book-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .file-slot { 
            aspect-ratio: 1/1.3; background: #15151b; border-radius: 8px; border: 1px solid #333;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; transition: transform 0.2s;
        }
        .file-slot.owned { border-color: #555; background: #22222a; border-bottom: 3px solid var(--gold); }
        .file-slot.empty { opacity: 0.1; }
        .slot-name { font-size: 0.55rem; width: 95%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ガチャ演出：魔法陣 */
        #summon-overlay {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: #000; z-index: 5000; align-items: center; justify-content: center;
        }
        .magic-circle { 
            width: 280px; height: 280px; border: 4px double var(--gold); border-radius: 50%;
            animation: rotate 4s linear infinite; box-shadow: 0 0 40px var(--gold);
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* リザルト画面 */
        .res-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index: 6000; align-items:center; justify-content:center; }
        .res-modal { width: 90%; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid var(--gold); }
        .res-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-height: 50vh; overflow-y: auto; }
        .res-card { background: #222; border: 1px solid #444; border-radius: 5px; padding: 5px; font-size: 0.5rem; }

        /* フッターメニュー */
        #menu-bar { position: fixed; bottom: 0; width: 100%; background: #16161a; display: flex; border-top: 1px solid var(--gold); z-index: 1000; }
        .menu-item { flex: 1; padding: 18px; color: #666; font-size: 0.8rem; }
        .menu-item.active { color: var(--gold); font-weight: bold; background: #1f1f25; }

        /* 汎用ボタン */
        #main-btn { width:150px; height:150px; border-radius:50%; background:radial-gradient(#444, #111); border:3px solid var(--gold); color:#fff; cursor: pointer; }
        #main-btn:active { transform: scale(0.95); }
        button { background: #222; color: #eee; border: 1px solid #555; padding: 10px; border-radius: 5px; cursor: pointer; }
        .btn-gold { border-color: var(--gold); color: var(--gold); }

        .float-num { position: absolute; font-weight: bold; pointer-events: none; animation: floatUp 0.6s forwards; z-index: 2000; }
        @keyframes floatUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-40px); } }
    </style>
</head>
<body id="body">

<div id="summon-overlay">
    <div class="magic-circle" id="circle"></div>
</div>

<div id="header">
    <div>霊貨 <span id="coins" class="val">0</span></div>
    <div>神結晶 <span id="rare-coins" class="val">0</span></div>
</div>

<div id="screen-home" class="screen active">
    <div style="height:40vh; display:flex; align-items:center; justify-content:center; position:relative;" id="click-area">
        <button id="main-btn">観測する</button>
    </div>
    <div style="background:rgba(30,30,40,0.8); padding:20px; border-radius:15px; border:1px solid var(--gold); text-align:left;">
        <h4 style="margin:0 0 10px; border-bottom:1px solid #444;">現在の観測徳</h4>
        効率: <span id="st-p" class="val">1</span> / 倍率: <span id="st-m" class="val">1.0</span>x<br>
        会心: <span id="st-c" class="val">0</span>% / 結晶: <span id="st-r" class="val">0.5</span>%
    </div>
</div>

<div id="screen-gacha" class="screen">
    <h3>招集の儀</h3>
    <div id="gacha-viewport">
        <div id="gacha-wrapper">
            <div class="gacha-item">
                <div class="gacha-box">
                    <div class="gacha-illust">⛩️</div>
                    <h4>通常招集</h4>
                    <button onclick="executeGacha('normal', 1)">1連</button>
                    <button onclick="executeGacha('normal', 10)">10連</button>
                    <button onclick="executeGacha('normal', 100)">100連</button>
                </div>
            </div>
            <div class="gacha-item">
                <div class="gacha-box" style="border-color:var(--evil);">
                    <div class="gacha-illust" style="text-shadow: 0 0 20px var(--evil);">✨</div>
                    <h4 style="color:var(--gold)">稀代招集</h4>
                    <button class="btn-gold" onclick="executeGacha('rare', 1)">1回 (5神結晶)</button>
                </div>
            </div>
        </div>
    </div>
    <p style="font-size:0.7rem; color:#888;">← スワイプで切り替え →</p>
</div>

<div id="screen-zukan" class="screen">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <button onclick="toggleZukanMode()" id="zukan-toggle-btn">全表示中</button>
        <div id="page-info" style="color:var(--gold); font-weight:bold;">Page 1</div>
        <div>
            <button onclick="changePage(-1)">前</button>
            <button onclick="changePage(1)">次</button>
        </div>
    </div>
    <div id="book-container" class="book-grid"></div>
</div>

<div id="screen-profile" class="screen">
    <h3>観測記録</h3>
    <div style="text-align:left; background:#1a1a1f; padding:20px; border-radius:15px; border:1px solid var(--gold);">
        <p>累計霊貨: <span id="stat-total-coins" class="val">0</span></p>
        <p>総観測数: <span id="stat-total-clicks" class="val">0</span></p>
        <p>総招集数: <span id="stat-total-gacha" class="val">0</span></p>
        <p>結晶発見: <span id="stat-total-rare" class="val">0</span></p>
    </div>
</div>

<div id="detail-overlay" class="res-overlay" onclick="this.style.display='none'">
    <div class="res-modal" id="detail-content" onclick="event.stopPropagation()"></div>
</div>

<div id="gacha-overlay" class="res-overlay" onclick="this.style.display='none'">
    <div class="res-modal">
        <h3 style="color:var(--gold);">招集結果</h3>
        <div id="gacha-res-list" class="res-grid"></div>
        <button onclick="document.getElementById('gacha-overlay').style.display='none'" style="width:100%; margin-top:20px; font-weight:bold;">戻る</button>
    </div>
</div>

<div id="menu-bar">
    <div class="menu-item active" onclick="changeScreen('home', this)">ホーム</div>
    <div class="menu-item" onclick="changeScreen('gacha', this)">ガチャ</div>
    <div class="menu-item" onclick="changeScreen('zukan', this)">図鑑</div>
    <div class="menu-item" onclick="changeScreen('profile', this)">記録</div>
</div>

<script src="cards.js"></script>
<script>
    let state = { coins: 0, rareCoins: 0, inv: {}, stats: { p: 1, m: 1.0, c: 0, r: 0.005 }, totalCoins: 0, totalClicks: 0, totalGacha: 0, totalRare: 0 };
    let curGacha = 0, curPage = 0, showAll = true;

    // スワイプ管理
    let gX = 0, zX = 0;
    const gWrapper = document.getElementById('gacha-wrapper');
    const zContainer = document.getElementById('book-container');

    gWrapper.addEventListener('touchstart', e => gX = e.touches[0].clientX);
    gWrapper.addEventListener('touchend', e => {
        let diff = gX - e.changedTouches[0].clientX;
        if(Math.abs(diff) > 50) switchGacha(diff > 0 ? 1 : -1);
    });

    zContainer.addEventListener('touchstart', e => zX = e.touches[0].clientX);
    zContainer.addEventListener('touchend', e => {
        let diff = zX - e.changedTouches[0].clientX;
        if(Math.abs(diff) > 50) changePage(diff > 0 ? 1 : -1);
    });

    function save() { localStorage.setItem('yaoyoro_v9', JSON.stringify(state)); }
    function load() {
        const s = localStorage.getItem('yaoyoro_v9');
        if (s) state = JSON.parse(s);
        updateStats(); updateDisplay();
    }

    function updateStats() {
        let p = 1, m = 1.0, c = 0, r = 0.005;
        for (let id in state.inv) {
            const card = cardData.find(x => x.id == id);
            const l = state.inv[id].l;
            if (!card || l === 0) continue;
            if (card.attr === "fire") p += card.bonus * l;
            if (card.attr === "water") m += card.bonus * l;
            if (card.attr === "earth") c += card.bonus * l;
            if (card.attr === "sky") r += card.bonus * l;
            if (card.attr === "evil") m *= (1 + card.bonus * l);
        }
        state.stats = { p, m, c, r };
    }

    document.getElementById('main-btn').onclick = (e) => {
        state.totalClicks++;
        let isCrit = Math.random() < state.stats.c;
        let gain = state.stats.p * state.stats.m * (isCrit ? 5 : 1);
        state.coins += gain; state.totalCoins += gain;
        if (Math.random() < state.stats.r) { state.rareCoins++; state.totalRare++; }
        showTapEffect(e.clientX, e.clientY, Math.floor(gain), isCrit);
        updateDisplay(); save();
    };

    function showTapEffect(x, y, val, crit) {
        const el = document.createElement('div');
        el.className = 'float-num';
        el.innerText = (crit ? "極・会心!" : "") + "+" + val;
        el.style.left = x + 'px'; el.style.top = y + 'px';
        if (crit) el.style.color = "#ff4500";
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 600);
    }

    function switchGacha(dir) {
        curGacha = Math.max(0, Math.min(1, curGacha + dir));
        gWrapper.style.transform = `translateX(-${curGacha * 100}%)`;
    }

    function executeGacha(type, times) {
        let cost = type === 'normal' ? 100 * times : 5 * times;
        let curr = type === 'normal' ? 'coins' : 'rareCoins';
        if (state[curr] < cost) return alert("不足しています");
        state[curr] -= cost; state.totalGacha += times;

        const summon = document.getElementById('summon-overlay');
        summon.style.display = 'flex';
        
        setTimeout(() => {
            summon.style.display = 'none';
            showRes(type, times);
        }, 1500);
    }

    function showRes(type, times) {
        let results = [];
        for (let i = 0; i < times; i++) {
            let roll = Math.random() * 100, rarity = 1;
            if (type === 'normal') {
                if (roll < 0.0001) rarity = 4; else if (roll < 5) rarity = 3; else if (roll < 25) rarity = 2; else rarity = 1;
            } else {
                if (roll < 3) rarity = 5; else if (roll < 20) rarity = 4; else rarity = 3;
            }
            let pool = cardData.filter(x => x.rare === rarity);
            let card = pool.length ? pool[Math.floor(Math.random()*pool.length)] : cardData[0];
            if (!state.inv[card.id]) state.inv[card.id] = { c: 0, l: 0 };
            state.inv[card.id].c++;
            if (state.inv[card.id].c >= Math.pow(state.inv[card.id].l + 1, 2)) { state.inv[card.id].l++; state.inv[card.id].c = 0; }
            results.push(card);
        }
        document.getElementById('gacha-res-list').innerHTML = results.map(c => `
            <div class="res-card" style="border-color:var(--${c.attr})">★${c.rare}<br><b>${c.name}</b></div>
        `).join('');
        document.getElementById('gacha-overlay').style.display = 'flex';
        updateStats(); updateDisplay(); save();
    }

    function changePage(dir) {
        let list = cardData;
        if (!showAll) list = cardData.filter(c => !!state.inv[c.id]);
        const max = Math.ceil(list.length / 9) - 1;
        curPage = Math.max(0, Math.min(max, curPage + dir));
        updateDisplay();
    }

    function toggleZukanMode() {
        showAll = !showAll;
        curPage = 0;
        document.getElementById('zukan-toggle-btn').innerText = showAll ? "全表示中" : "所持のみ";
        updateDisplay();
    }

    function showDetail(id) {
        const c = cardData.find(x => x.id == id);
        const info = state.inv[id] || { l: 0, c: 0 };
        const bonusVal = (c.bonus * (info.l || 1));
        const bonusText = (c.attr === "earth" || c.attr === "sky") ? (bonusVal * 100).toFixed(2) + "%" : bonusVal.toFixed(2);
        
        document.getElementById('detail-content').innerHTML = `
            <h3 style="color:var(--${c.attr}); border-bottom:1px solid #444; padding-bottom:10px;">★${c.rare} ${c.name}</h3>
            <div style="background:#25252e; padding:15px; border-radius:10px; border:1px solid var(--gold); margin:15px 0; text-align:left;">
                <b style="color:var(--gold)">神徳：</b> ${getEffectName(c.attr)} +${bonusText}
                ${c.attr === 'evil' ? '<p style="font-size:0.65rem; color:#888; margin-top:5px;">※この加護は、他全ての加護が適用された後に最後の一乗として作用します。</p>' : ''}
            </div>
            <p style="font-style:italic; line-height:1.7; color:#ddd;">「${c.story}」</p>
            <button onclick="document.getElementById('detail-overlay').style.display='none'" style="width:100%; font-weight:bold; margin-top:20px; border-color:var(--gold);">閉じる</button>
        `;
        document.getElementById('detail-overlay').style.display = 'flex';
    }

    function getEffectName(attr) {
        return { fire: "効率", water: "倍率", earth: "会心率", sky: "結晶発見率", evil: "深淵の理" }[attr];
    }

    function updateDisplay() {
        document.getElementById('coins').innerText = Math.floor(state.coins).toLocaleString();
        document.getElementById('rare-coins').innerText = state.rareCoins;
        document.getElementById('st-p').innerText = state.stats.p;
        document.getElementById('st-m').innerText = state.stats.m.toFixed(2);
        document.getElementById('st-c').innerText = (state.stats.c * 100).toFixed(1);
        document.getElementById('st-r').innerText = (state.stats.r * 100).toFixed(3);
        
        document.getElementById('stat-total-coins').innerText = Math.floor(state.totalCoins).toLocaleString();
        document.getElementById('stat-total-clicks').innerText = state.totalClicks;
        document.getElementById('stat-total-gacha').innerText = state.totalGacha;
        document.getElementById('stat-total-rare').innerText = state.totalRare;

        let displayList = cardData;
        if (!showAll) displayList = cardData.filter(c => !!state.inv[c.id]);

        const book = document.getElementById('book-container');
        book.innerHTML = "";
        const start = curPage * 9;
        for(let i=0; i<9; i++){
            const c = displayList[start + i];
            if(!c) { book.innerHTML += `<div class="file-slot empty"></div>`; continue; }
            const owned = !!state.inv[c.id];
            const info = state.inv[c.id] || { l: 0, c: 0 };
            book.innerHTML += `
                <div class="file-slot ${owned ? 'owned' : 'empty'}" onclick="${owned ? `showDetail(${c.id})` : ''}" style="${owned ? `border-color:var(--${c.attr})` : ''}">
                    ${owned ? `<div class="file-lvl">+${info.l}</div>` : ''}
                    <div style="font-size:1.5rem;">${owned ? '📜' : '？'}</div>
                    <div class="slot-name">${owned ? c.name : '未確認'}</div>
                    ${owned ? `<progress value="${info.c}" max="${Math.pow(info.l+1, 2)}" style="width:80%; height:3px;"></progress>` : ''}
                </div>
            `;
        }
        document.getElementById('page-info').innerText = `Page ${curPage + 1}`;
    }

    function changeScreen(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + id).classList.add('active');
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        el.classList.add('active');
    }
    window.onload = load;
</script>
</body>
</html>
